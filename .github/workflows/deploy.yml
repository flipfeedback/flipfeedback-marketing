name: Deploy

# Builds and publishes flipfeedback.com to S3 + CloudFront.
# The AWS target (bucket, distribution, IAM role) is provisioned by flipfeedback-infra.
# This job no-ops unless the required repository variables/secrets are configured, so the
# repo stays buildable before infra is wired up.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check deploy configuration
        id: cfg
        run: |
          if [ -n "${{ vars.AWS_DEPLOY_ROLE_ARN }}" ] && [ -n "${{ vars.S3_BUCKET }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy variables not set; skipping AWS deploy. Build artifact is available."
          fi

      - name: Configure AWS credentials
        if: steps.cfg.outputs.ready == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        if: steps.cfg.outputs.ready == 'true'
        run: aws s3 sync ./dist "s3://${{ vars.S3_BUCKET }}" --delete

      - name: Invalidate CloudFront
        if: steps.cfg.outputs.ready == 'true' && vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
